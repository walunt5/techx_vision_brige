# ==============================================================================
#  vision_bridge_node 参数配置文件
#  用法：ros2 launch techx_vision_bridge vision_bridge.launch.py
#  只需修改本文件中的 IP 和端口，无需改动任何代码
# ==============================================================================

techx_vision_bridge:
  ros__parameters:
    # --- 网口设置 ---
    # 监听的网口地址。"0.0.0.0" 表示监听本机所有网口
    # 如果只想监听特定的网口，改成对应 IP，例如 "192.168.10.100"
    udp_bind_addr: "0.0.0.0"

    # UDP 监听端口（必须和 Jetson 发送端一致）
    udp_port: 12345

    # --- 发布话题 ---
    topic_name: "/techx/vision/targets"

    # --- 超时设置 ---
    # 连续多少秒没收到合法数据就自动重连 Socket
    reconnect_timeout_sec: 3.0

    # 连续多少秒没收到合法数据就打印"信号丢失"警告
    # 设为 0.3 即 300ms，比 reconnect_timeout 短，起到提前预警作用
    watchdog_timeout_sec: 0.3

    # --- 系统资源 ---
    # 工作线程 nice 值（0~19，越大优先级越低）
    # 设为 10 确保 odin1、导航、下位机通讯优先占用 CPU
    # 设为 0 表示不降优先级（需要 sudo 才能设为负值提升优先级）
    thread_nice: 10

    # --- 时间戳设置 ---
    # 时间戳来源（非常重要！影响控制节点数据新鲜度判断）:
    #
    #   "local"    — 【推荐·默认】使用 GMK 本机接收时刻打时间戳
    #                 ✅ 所有时间戳与 GMK 控制回路时钟一致，无偏差
    #                 ✅ 控制节点做新鲜度检查 (now-stamp < 100ms) 不会误丢弃
    #                 ✅ 多传感器融合时视觉/IMU/里程计时间戳自然对齐
    #                 ⚠️ header.stamp 代表"GMK收到数据的时间"而非"Jetson拍摄时间"
    #                    (两者相差约 31ms: Jetson推理30ms + 网络0.25ms，可忽略)
    #
    #   "auto"     — 自动校验上游时间戳，校验通过则使用 Jetson 时间，异常则回退 local
    #                 ⚠️ 若 Jetson 与 GMK 时钟不同步，即使校验通过，
    #                    控制节点做新鲜度检查仍可能误丢弃数据！
    #                 ⚠️ 仅当 Jetson 与 GMK 已通过 chrony/NTP 同步时钟后使用
    #
    #   "upstream" — 强制使用 Jetson 上游时间戳（无条件信任）
    #                 ❌ 不推荐用于控制回路，仅用于调试或已确认时钟同步的场景
    timestamp_mode: "local"

    # 最小有效 Unix 时间戳（秒），小于此值判定为非 Unix 纪元时钟（如 monotonic）
    # 仅在 timestamp_mode="auto" 时生效
    # 默认 1500000000.0 ≈ 2017-07-14
    min_valid_timestamp: 1500000000.0

    # 允许的上游时间戳最大超前量（秒），超过此值判定为时钟严重不同步
    # 仅在 timestamp_mode="auto" 时生效
    # 默认 3600.0 = 1 小时
    max_future_sec: 3600.0